<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#7c3aed" />
    <title>Monster Huddle Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #f5f3ff 0%, #ffffff 50%, #fdf2f8 100%);
        color: #18181b;
      }

      main {
        width: min(88vw, 420px);
        text-align: center;
      }

      img {
        width: 132px;
        height: 132px;
        object-fit: contain;
        filter: drop-shadow(0 16px 22px rgba(124, 58, 237, 0.2));
      }

      h1 {
        margin: 18px 0 8px;
        font-size: 28px;
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: #52525b;
        font-weight: 600;
        line-height: 1.5;
      }

      button {
        margin-top: 22px;
        border: 0;
        border-radius: 12px;
        background: #7c3aed;
        color: white;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        padding: 12px 18px;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/monster-huddle-transparent.png" alt="Monster Huddle" />
      <h1>You are offline</h1>
      <p>Monster Huddle is installed, but live lessons and account data need an internet connection.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
